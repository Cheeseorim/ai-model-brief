name: Collect model updates

on:
  schedule:
    # GitHub scheduled workflows can be delayed or occasionally skipped.
    # Keep multiple KST backup slots so one missed run does not skip the day.
    # Morning brief: 09:10, 09:40, 10:10 KST.
    - cron: "10 0 * * *"
    - cron: "40 0 * * *"
    - cron: "10 1 * * *"
    # Weekday afternoon check: 15:10, 15:40, 16:10 KST.
    - cron: "10 6 * * 1-5"
    - cron: "40 6 * * 1-5"
    - cron: "10 7 * * 1-5"
  workflow_dispatch:
    inputs:
      summary_max_events:
        description: "Maximum number of new events to summarize in this run"
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: ai-model-brief-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Collect official sources
        run: npm run collect
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUMMARY_MODEL: ${{ vars.SUMMARY_MODEL }}
          SUMMARY_MAX_EVENTS: ${{ inputs.summary_max_events || vars.SUMMARY_MAX_EVENTS }}
      - name: Commit changed data
        run: |
          git config user.name "ai-model-brief[bot]"
          git config user.email "ai-model-brief[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "data: collect model updates"
          # A dashboard/code deployment can land while collection is running.
          # Rebase the completed data commit, not the modified working tree.
          git pull --rebase origin main
          git push
          gh workflow run "Deploy dashboard" --ref main
        env:
          GH_TOKEN: ${{ github.token }}
