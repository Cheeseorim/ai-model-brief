<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenAI, Claude, Gemini, Vertex AI, Amazon Bedrock 모델 변경사항을 핵심만 추려 보여주는 AI 브리핑" />
    <title>AI Model Brief</title>
    <link rel="stylesheet" href="./styles.css?v=20260710-6" />
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">공식 문서 변경 모니터링</p>
        <h1>AI Model Brief</h1>
        <p class="lede">OpenAI, Anthropic Claude, Google Gemini, Vertex AI, Amazon Bedrock의 모델·API 변경사항을 핵심만 추려 보여줍니다.</p>
      </div>
      <div id="health" class="health">수집 상태 확인 중…</div>
    </header>

    <main>
      <nav class="section-tabs" aria-label="대시보드 섹션">
        <button type="button" class="active" data-tab="briefing">주요 뉴스</button>
        <button type="button" data-tab="vendors">공급사별 이슈</button>
        <button type="button" data-tab="pricing">가격 비교</button>
      </nav>

      <section class="headline-panel tab-panel active" data-panel="briefing" aria-labelledby="headlineTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">주요 변경 요약</p>
            <h2 id="headlineTitle">주요 뉴스 브리핑</h2>
          </div>
          <span id="headlineMeta"></span>
        </div>
        <div id="headlines" class="headline-list"></div>
      </section>
      <section class="coverage tab-panel" data-panel="vendors" aria-labelledby="coverageTitle">
        <div class="section-heading compact">
          <div>
            <p class="eyebrow">공급사별 체크포인트</p>
            <h2 id="coverageTitle">공급사별 핵심 이슈</h2>
          </div>
          <span id="coverageMeta"></span>
        </div>
        <div id="coverage" class="coverage-list"></div>
      </section>
      <section class="pricing-panel tab-panel" data-panel="pricing" aria-labelledby="pricingTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">비용 비교</p>
            <h2 id="pricingTitle">모델별 토큰 가격</h2>
          </div>
          <span id="pricingMeta"></span>
        </div>
        <div class="pricing-scroll">
          <table class="pricing-table">
            <thead>
              <tr>
                <th>모델</th>
                <th>입력</th>
                <th>출력</th>
                <th>캐시 읽기</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="pricingRows"></tbody>
          </table>
        </div>
        <div class="cost-calculator" aria-labelledby="calculatorTitle">
          <div class="calculator-copy">
            <p class="eyebrow">토큰 계산기</p>
            <h3 id="calculatorTitle">선택한 모델 기준 월 예상 비용</h3>
            <p>입력·출력 토큰과 하루 요청 수를 넣으면 30일 기준 비용을 계산합니다.</p>
          </div>
          <div id="pricingModelToggles" class="model-toggles"></div>
          <div class="pricing-tools">
            <label>
              <span>요청당 입력 토큰</span>
              <input id="inputTokens" type="number" min="0" step="1000" value="10000" />
            </label>
            <label>
              <span>요청당 출력 토큰</span>
              <input id="outputTokens" type="number" min="0" step="1000" value="2000" />
            </label>
            <label>
              <span>하루 요청 수</span>
              <input id="dailyRequests" type="number" min="0" step="100" value="1000" />
            </label>
          </div>
          <div id="pricingEstimate" class="pricing-estimate"></div>
        </div>
        <div id="pricingSources" class="pricing-sources"></div>
      </section>
    </main>
    <script type="module" src="./app.js?v=20260711-briefing10d"></script>
  </body>
</html>
