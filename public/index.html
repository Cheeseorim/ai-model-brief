<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenAI, Claude, Gemini, Vertex AI, Amazon Bedrock 모델 변경사항을 매일 요약하는 AI 브리핑" />
    <title>AI Model Brief</title>
    <link rel="stylesheet" href="./styles.css?v=20260710-2" />
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">공식 문서 변경 모니터링</p>
        <h1>AI Model Brief</h1>
        <p class="lede">OpenAI, Anthropic Claude, Google Gemini, Vertex AI, Amazon Bedrock의 모델·API 변경사항을 매일 아침 핵심만 추려 보여줍니다.</p>
      </div>
      <div id="health" class="health">수집 상태 확인 중…</div>
    </header>

    <main>
      <section class="headline-panel" aria-labelledby="headlineTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">주요 변경 요약</p>
            <h2 id="headlineTitle">오늘 먼저 볼 것</h2>
          </div>
          <span id="headlineMeta"></span>
        </div>
        <div id="headlines" class="headline-list"></div>
      </section>
      <section class="coverage" aria-labelledby="coverageTitle">
        <div class="section-heading compact">
          <div>
            <p class="eyebrow">공급사별 브리핑</p>
            <h2 id="coverageTitle">공급사별로 지금 볼 것</h2>
          </div>
        </div>
        <div id="coverage" class="coverage-grid"></div>
      </section>
      <section class="toolbar">
        <div class="filters" id="vendorFilters"></div>
        <select id="kindFilter" aria-label="변경 유형">
          <option value="">모든 유형</option>
          <option value="deprecation">지원 종료</option>
          <option value="breaking-change">호환성 변경</option>
          <option value="release">신규 출시</option>
          <option value="pricing">가격</option>
          <option value="changelog">변경 로그</option>
          <option value="news">뉴스</option>
        </select>
        <input id="search" type="search" placeholder="모델이나 변경사항 검색" />
      </section>

      <section>
        <div class="section-heading">
          <div>
            <p class="eyebrow">최근 업데이트</p>
            <h2>최근 변경사항 5건</h2>
          </div>
          <span id="resultCount"></span>
        </div>
        <div id="events" class="event-grid"></div>
      </section>
    </main>

    <template id="eventTemplate">
      <article class="event-card">
        <div class="event-top">
          <div>
            <span class="vendor"></span>
            <span class="source"></span>
          </div>
          <span class="kind"></span>
        </div>
        <h3></h3>
        <p class="original-title"></p>
        <p class="summary"></p>
        <div class="models"></div>
        <footer>
          <span class="date"></span>
          <a target="_blank" rel="noreferrer">원문 보기 ↗</a>
        </footer>
      </article>
    </template>
    <script type="module" src="./app.js?v=20260710-2"></script>
  </body>
</html>
